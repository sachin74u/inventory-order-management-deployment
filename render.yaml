databases:
  - name: inventory-order-db
    plan: free
    databaseName: inventory_db
    user: inventory_user

services:
  - type: web
    name: inventory-order-api
    runtime: docker
    plan: free
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-order-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
